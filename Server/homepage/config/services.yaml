- McRubes:
    - System Info:
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: cpu
    - CPU Temp:
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: sensors:Core 0
    - Memory:
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: mem
    - Media Drive:
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: fs:/Media
    - Network:
        widget:
          type: glances
          url: http://localhost:61208
          version: 4
          metric: network:enp0s31f6

