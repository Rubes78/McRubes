# McRubes Homepage Services

# ============================================================================
# DAD TAB
# ============================================================================

- "":
    - How to Use McRubes:
        href: http://mcrubes.local:8090
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/readme.svg
        description: New here? Start with the guide

- "Watch & Request":
    - Plex:
        href: http://mcrubes.local:32400/web
        icon: plex
        description: Watch movies and TV
        server: mcrubens
        container: plex
        widget:
          type: plex
          url: http://localhost:32400
          key: f6wrVCK4p2-8tqyTSkiQ
          fields: ["streams"]
    - Overseerr:
        href: http://mcrubes.local:5055
        icon: seerr
        description: Request movies and TV shows
        server: mcrubens
        container: overseerr

- "Get Media":
    - Sonarr:
        href: http://mcrubes.local:8989
        icon: sonarr
        description: TV show downloads
        server: mcrubens
        container: sonarr
        widget:
          type: sonarr
          url: http://localhost:8989
          key: 08c159a9e0474009aded93a30d4e4681
          enableQueue: true
          fields: ["wanted", "queued", "series"]
    - Radarr:
        href: http://mcrubes.local:7878
        icon: radarr
        description: Movie downloads
        server: mcrubens
        container: radarr
        widget:
          type: radarr
          url: http://localhost:7878
          key: ffeec2c86e954a1aa064cfb98c1d8509
          enableQueue: true
          fields: ["wanted", "missing", "queued", "movies"]
    - qBittorrent:
        href: http://mcrubes.local:8888
        icon: qbittorrent
        description: Add torrents manually
        server: mcrubens
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://localhost:8888
          username: admin
          password: mcrubens
          enableLeechProgress: true
          fields: ["download", "seed", "upload"]
    - SABnzbd:
        href: http://mcrubes.local:7777
        icon: sabnzbd
        description: Usenet downloader
        server: mcrubens
        container: sabnzbd
        widget:
          type: sabnzbd
          url: http://localhost:7777
          key: b07ad88d9baf4bf3a51499133821f60a

- "Books & Files":
    - ShelfMark:
        href: http://mcrubes.local:8085
        icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/bookstack.svg
        description: Find and download books
        server: mcrubens
        container: shelfmark
    - Calibre Web:
        href: http://mcrubes.local:8084
        icon: calibre
        description: Read your book library
        server: mcrubens
        container: calibre-web-automated
        widget:
          type: calibreweb
          url: http://localhost:8084
          username: mcrubes
          password: mcrubes
    - FileBrowser:
        href: http://mcrubes.local:8080
        icon: filebrowser
        description: Browse and manage files
        server: mcrubens
        container: filebrowser

